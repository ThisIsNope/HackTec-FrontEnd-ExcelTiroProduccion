<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <title>Login</title>
    
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center fw-bold mb-4">Iniciar Sesión</h2>
                        <form id="login-form" onsubmit="handleLogin(event)">
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control rounded-3" id="username" placeholder="Correo Electrónico" required>
                                <label for="username" class="text-muted">Correo Electrónico</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control rounded-3" id="password" placeholder="Contraseña" required>
                                <label for="password" class="text-muted">Contraseña</label>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Entrar</button>
                            </div>
                        </form>
                        <p class="text-center mt-4 mb-0 text-muted">¿No tienes cuenta? <br><a href="signup.html" class="text-decoration-none fw-semibold">Regístrate aquí</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
<script src="../JS/login.js"></script>
</html>
