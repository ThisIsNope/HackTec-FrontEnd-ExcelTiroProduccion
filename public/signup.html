<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <title>Signup</title>
    <style>
        .form-control, .form-select {
            border: 2px solid #dee2e6 !important;
        }
    </style>
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="container">
        <button type="button" class="btn btn-primary btn-lg rounded-pill fw-bold mb-4" onclick="window.location.href='./index.html'">Inicio</button>

        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center fw-bold mb-4">Registrarse</h2>
                        
                        <div class="mb-4">
                            <label for="user-type" class="form-label text-muted">Tipo de Cuenta</label>
                            <select id="user-type" class="form-select rounded-3 " onchange="toggleCompanyFields()" required>
                                <option value="particular">Particular</option>
                                <option value="empresa">Empresa</option>
                            </select>
                        </div>

                        <form id="signup-form" onsubmit="handleSignup(event)">
                            <h5 class="fw-bold mb-3 text-muted border-bottom pb-2">Datos Personales</h5>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-floating mb-3 ">
                                        <input type="text" class="form-control rounded-3" id="nombre" placeholder="Nombre" required>
                                        <label for="nombre" class="text-muted">Nombre</label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control rounded-3" id="last-name" placeholder="Apellido Paterno">
                                        <label for="last-name" class="text-muted">Apellido Paterno</label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control rounded-3" id="middle-name" placeholder="Apellido Materno">
                                        <label for="middle-name" class="text-muted">Apellido Materno</label>
                                    </div>
                                </div>
                                
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control rounded-3" id="username" placeholder="Correo Principal" required>
                                        <label for="username" class="text-muted">Correo Principal</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="tel" class="form-control rounded-3" id="phone" placeholder="Número de Teléfono" required>
                                        <label for="phone" class="text-muted">Teléfono</label>
                                    </div>
                                </div>
                                
                                <div class="col-md-12">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control rounded-3" id="email" placeholder="Correo Electrónico Secundario" required>
                                        <label for="email" class="text-muted">Correo Secundario (Opcional)</label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control rounded-3" id="new-password" placeholder="Contraseña" required>
                                        <label for="new-password" class="text-muted">Contraseña</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control rounded-3" id="confirm-password" placeholder="Confirmar Contraseña" required>
                                        <label for="confirm-password" class="text-muted">Confirmar Contraseña</label>
                                    </div>
                                </div>
                            </div>

                            <h5 class="fw-bold mt-3 mb-3 text-muted border-bottom pb-2">Ubicación</h5>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control rounded-3" id="state" placeholder="Estado" required>
                                        <label for="state" class="text-muted">Estado</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control rounded-3" id="city" placeholder="Ciudad" required>
                                        <label for="city" class="text-muted">Ciudad</label>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control rounded-3" id="address" placeholder="Dirección Completa" required>
                                        <label for="address" class="text-muted">Dirección Completa</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Campos de Empresa (Ocultos por defecto) -->
                            <div id="info-para-empresa" style="display:none;">
                                <h5 class="fw-bold mt-4 mb-3 text-muted border-bottom pb-2">Datos de la Empresa</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control rounded-3" id="company-name" placeholder="Nombre Comercial">
                                            <label for="company-name" class="text-muted">Nombre Comercial</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control rounded-3" id="rfc" placeholder="RFC">
                                            <label for="rfc" class="text-muted">RFC</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control rounded-3" id="business-name" placeholder="Razón Social">
                                            <label for="business-name" class="text-muted">Razón Social</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control rounded-3" id="business-type" placeholder="Giro">
                                            <label for="business-type" class="text-muted">Giro / Actividad</label>
                                        </div>
                                    </div>
                                    <div class="col-md-12">
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control rounded-3" id="website" placeholder="Página Web">
                                            <label for="website" class="text-muted">Página Web (Opcional)</label>
                                        </div>
                                    </div>
                                    <div class="col-md-12">
                                        <div class="form-floating mb-3">
                                            <textarea class="form-control rounded-3" id="business-description" placeholder="Descripción de la Empresa" style="height: 100px;"></textarea>
                                            <label for="business-description" class="text-muted">Descripción de la Empresa</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Registrarse</button>
                            </div>
                        </form>
                        
                        <p class="text-center mt-4 mb-0 text-muted">¿Ya tienes cuenta? <br><a href="login.html" class="text-decoration-none fw-semibold">Inicia sesión aquí</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleCompanyFields() {
            const userType = document.getElementById('user-type').value;
            const companyForm = document.getElementById('info-para-empresa');
            
            // Obtener campos dentro de la empresa para requerirlos solo si está visible
            const companyInputs = companyForm.querySelectorAll('input, textarea');

            if (userType === 'empresa') {
                companyForm.style.display = 'block';
                companyInputs.forEach(input => input.required = (input.id !== 'website')); // Hacemos website opcional
            } else {
                companyForm.style.display = 'none';
                companyInputs.forEach(input => input.required = false);
            }
        }
    </script>
</body>

</html>
