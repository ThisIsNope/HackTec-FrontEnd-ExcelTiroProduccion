<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Local - Publicar Lote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="producer.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <a href="../public/index.html" class="btn btn-light border shadow-sm rounded-pill fw-bold px-4 mb-4 text-dark text-decoration-none">← Volver al inicio</a>
        
        <div class="row g-4">
        
            <div>
                <section id="view-producer" class="card shadow-sm border-0 rounded-4 h-100">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="fw-bold mb-4" style="color: var(--primary-green);">Crear Publicación (Venta / Trueque)</h3>
                        
                        <!-- 1. Módulo de Carga Avanzado (Wizard) -->
                        <form id="product-form" onsubmit="handleFormSubmit(event)">
                            
                            <!-- Paso 1 -->
                            <div id="step-1" class="wizard-step active">
                                <h5 class="fw-bold text-muted border-bottom pb-2 mb-4">Paso 1: ¿Qué vas a registrar?</h5>
                                
                                <button type="button" id="btn-foto" class="btn btn-outline-secondary w-100 rounded-3 py-3 mb-4 fw-bold shadow-sm" onclick="document.getElementById('product-image').click()">
                                    📷 Capturar Foto del Lote
                                </button>
                                <input type="file" id="product-image" accept="image/*" capture="environment" style="display:none;" onchange="handleImageUpload(event)">
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-muted small">Categoría / Tipo:</label>
                                    <select id="category" class="form-select form-select-lg rounded-3" required>
                                        <option value="frutas">🍎 Frutas</option>
                                        <option value="verduras">🥦 Verduras</option>
                                        <option value="madera">🪵 Madera</option>
                                        <option value="textil">🧶 Textil</option>
                                        <option value="carton">🪵 Carton</option>
                                    </select>
                                </div>            
                                <div class="form-floating mb-3">
                                    <input type="text" id="product-name" class="form-control rounded-3" placeholder="Nombre del producto" required>
                                    <label for="product-name" class="text-muted">Nombre del producto (Ej: Manzana Golden)</label>
                                </div>
                                <div class="form-floating mb-4">
                                    <input type="text" id="product-description" class="form-control rounded-3" placeholder="Descripción del producto" required>
                                    <label for="product-description" class="text-muted">Descripción del producto</label>
                                </div>
                                
                                <button type="button" class="btn btn-primary btn-lg rounded-pill fw-bold w-100" onclick="goToStep(2)">Siguiente →</button>
                            </div>

                            <!-- Paso 2 -->
                            <div id="step-2" class="wizard-step">
                                <h5 class="fw-bold text-muted border-bottom pb-2 mb-4">Paso 2: Volumen y Valor</h5>
                                
                                <div class="mb-3">
                                    <label for="transaction-type" class="form-label fw-bold text-muted small">Tipo de transacción:</label>
                                    <select id="transaction-type" class="form-select rounded-3" onchange="togglePriceField()" required>
                                        <option value="venta">Venta</option>
                                        <option value="trueque">Trueque</option>
                                    </select>
                                </div>
                                
                                <div class="row g-2 mb-3">
                                    <div class="col-8">
                                        <div class="form-floating">
                                            <input type="number" id="quantity" class="form-control rounded-3" placeholder="Volumen/Masa" required>
                                            <label for="quantity" class="text-muted">Volumen/Masa</label>
                                        </div>
                                    </div>
                                    <div class="col-4">
                                        <div class="form-floating">
                                            <select id="unit" class="form-select rounded-3">
                                                <option value="kg">Kg</option>
                                                <option value="ton">Ton</option>
                                                <option value="cajas">Cajas</option>
                                            </select>
                                            <label for="unit" class="text-muted">Unidad</label>
                                        </div>
                                    </div>
                                </div>

                                <div id="price-container" class="mb-4">
                                    <div class="form-floating mb-1">
                                        <input type="number" id="price" class="form-control rounded-3 border-success" placeholder="Precio unitario" oninput="showPriceSuggestion()" required>
                                        <label for="price" class="text-success fw-bold">Precio Justo ($MXN)</label>
                                    </div>
                                    <p id="price-suggestion" class="text-muted small px-2 mb-0" style="min-height: 20px;"></p>
                                </div>
                                
                                <div class="d-flex gap-2 mt-4">
                                    <button type="button" class="btn btn-light border rounded-pill fw-bold w-50" onclick="goToStep(1)">← Atrás</button>
                                    <button type="button" class="btn btn-primary rounded-pill fw-bold w-50" onclick="goToStep(3)">Siguiente →</button>
                                </div>
                            </div>

                            <!-- Paso 3 -->
                            <div id="step-3" class="wizard-step">
                                <h5 class="fw-bold text-muted border-bottom pb-2 mb-3">Paso 3: Trazabilidad</h5>
                                <p class="text-muted small mb-4">Captura el lugar exacto de origen para garantizar la trazabilidad inmutable del lote.</p>
                                
                                <div class="mb-4">
                                    <!-- Búsqueda manual de dirección -->
                                    <div class="input-group mb-2 shadow-sm rounded-pill overflow-hidden border">
                                        <input type="text" id="address-search" class="form-control border-0 px-4" placeholder="Ej: Blvd V. Carranza, Saltillo">
                                        <button class="btn btn-primary px-3 fw-bold" type="button" onclick="searchAddress()">🔍 Buscar</button>
                                    </div>
                                    <div class="text-center text-muted small fw-bold mb-2">- O -</div>
                                    <!-- Botón para obtener la ubicación por GPS -->
                                    <button type="button" id="btn-gps" class="btn btn-outline-primary w-100 rounded-pill fw-bold shadow-sm py-2" onclick="captureGPS()">
                                        📍 Obtener mi ubicación exacta (GPS)
                                    </button>
                                    <p id="gps-status" class="text-success small fw-bold mt-2 mb-0 text-center"></p>
                                    <!-- Contenedor del mapa (Oculto hasta presionar GPS) -->
                                    <div id="map-origen" style="height: 200px; border-radius: 10px; display: none;" class="mt-3 shadow-sm border"></div>
                                </div>

                                
                                <div class="d-flex gap-2 mt-4">
                                    <button type="button" class="btn btn-light border rounded-pill fw-bold w-50" onclick="goToStep(2)">← Atrás</button>
                                    <button type="submit" id="btn-submit" class="btn btn-success rounded-pill fw-bold w-50 shadow-sm">Guardar y QR</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>

        <!-- 2. Generador de Trazabilidad (Modal QR) -->
        <div id="qr-modal">
            <div class="qr-modal-content">
                <h3 class="text-success fw-bold mb-3">¡Lote Registrado!</h3>
                <p id="qr-product-name-display" class="fs-5 text-dark fw-semibold mb-1"></p>
                <p class="text-muted small mb-4">ID: <span id="lote-id-text" class="fw-bold text-dark"></span></p>
                
                <img id="qr-code-img" src="" alt="QR Trazabilidad" class="img-fluid border rounded-3 p-2 mb-4 shadow-sm" style="max-width: 200px;">
                
                <div class="d-grid gap-2">
                    <button onclick="shareOnWhatsApp()" class="btn btn-success rounded-pill fw-bold">📲 Compartir por WhatsApp</button>
                    <button onclick="downloadQR()" class="btn btn-outline-primary rounded-pill fw-bold">Descargar QR</button>
                    <button onclick="window.location.reload()" class="btn btn-light border rounded-pill fw-bold mt-2">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="producer.js"></script>
</body>
</html>
