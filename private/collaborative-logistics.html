<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Logística Colaborativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="producer.css">
</head>
<body class="bg-light">
<div class="container py-4">
    <a href="../index.html" class="btn btn-light border shadow-sm rounded-pill fw-bold px-4 mb-4 text-dark text-decoration-none">← Volver al inicio</a>
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0" style="color: var(--primary-green);">Panel de Logística</h3>
        <span class="badge bg-success rounded-pill px-3 py-2 fw-semibold fs-6">🟢 Activo</span>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0 rounded-4 mb-4">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                        <h5 class="fw-bold text-muted mb-0">🗺️ Ruta de Entregas</h5>
                        <span class="small text-muted">CO2 estimado: <strong class="text-success" id="co2-ruta">0 kg</strong></span>
                    </div>
                    <div id="map-ruta" style="height: 350px; border-radius: 12px;"></div>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold text-muted mb-4 border-bottom pb-2">Itinerario de Paradas</h5>
                    <div class="position-relative ps-4 border-start border-primary border-3 ms-2" id="itinerario">
                        <p class="text-muted small">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 mb-4 wallet-card h-auto">
                <div class="card-body p-4 d-flex flex-column justify-content-center text-center">
                    <h4 class="fw-bold mb-3">Capacidad del Vehículo</h4>
                    <p class="mb-1 opacity-75" id="porcentaje-capacidad">0% Lleno</p>
                    <div class="wallet-balance mb-2">
                        <span id="peso-actual">0</span>
                        <span class="fs-4"> / 3.5 Ton</span>
                    </div>
                    <div class="progress mt-3 mb-3" style="height:12px; background:rgba(255,255,255,0.3); border-radius:10px;">
                        <div id="barra-capacidad" class="progress-bar bg-warning" style="width:0%; border-radius:10px;"></div>
                    </div>
                    <p class="small opacity-75 mt-2 mb-0">Espacio disponible para recolecciones pendientes.</p>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold text-muted border-bottom pb-2 mb-3">Lotes Pendientes</h5>
                    <div id="lotes-lista">
                        <p class="text-muted small text-center">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="collaborative-logistics.js"></script>
</body>
</html>
