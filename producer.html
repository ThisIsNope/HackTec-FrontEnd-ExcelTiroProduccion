<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>>Conecta Local - Productor</title>
</head>
<body>
    <a href="index.html">← Volver al inicio</a>
    <section id="view-producer" class="app-view">
        <h2>Panel de Productor</h2>
        
        <form id="product-form" onsubmit="generateQR(event)">
            <label for="transaction-type">Tipo de transacción:</label>
            <select id="transaction-type" onchange="togglePriceField()" required>
                <option value="venta">Venta</option>
                <option value="trueque">Trueque</option>
            </select>
            <input type="text" id="product-name" placeholder="Nombre del producto" required>
            <input type="text" id="product-description" placeholder="Descripción del producto" required>
            <input type="text" id="category" placeholder="Categoría" required>
            <input type="number" id="quantity" placeholder="Cantidad" required>
            <input type="number" id="price" placeholder="Precio" required>
            <input type="text" id="location" placeholder="Ubicación" required>
            <p>Imagen o Foto del producto:</p>
            <input type="file" id="product-image" accept="image/*" capture="environment" required>
            <button type="submit">Guardar y Generar QR</button>
        </form>
        <div id="qr-result" style="display:none;">
            <div class="notification" style="background-color: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 10px;">Código QR generado exitosamente</div>
            <img id="qr-code" src="" alt="Código QR del producto">
            <button onclick="shareOnWhatsApp()">Compartir en WhatsApp</button>  
            <button onclick="downloadQR()">Descargar QR</button>    
        </div>

        <div id="green-wallet ">
            
        </div>
    </section>

    <script src="producer.js"></script>
</body>
</html>
